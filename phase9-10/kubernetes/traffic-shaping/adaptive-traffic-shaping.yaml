# kubernetes/traffic-shaping/adaptive-traffic-shaping.yaml
#
# Adaptive Traffic Shaping — Protect the System Under Load
#
# Three tiers of protection (applied in order under increasing load):
#   Tier 1: Rate limiting — token bucket per customer, per endpoint
#   Tier 2: Load shedding — drop lowest-priority requests first
#   Tier 3: Circuit breaking — stop sending traffic to degraded services
#
# Priority tiers (highest → lowest):
#   P0: Health checks, payment processing
#   P1: Order creation, order status
#   P2: Notifications, analytics queries
#   P3: Batch operations, reporting
#
# Under normal load: all tiers pass through
# Under 80% capacity: P3 sheds
# Under 90% capacity: P2 and P3 shed
# Under 95% capacity: P0/P1 only pass through
# Circuit breaker fires: upstream dependency isolated

---
# ── Istio DestinationRule — circuit breaker per service ───────────────────────

apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: order-service-circuit-breaker
  namespace: app
spec:
  host: order-service.app.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 100    # Queue depth — beyond this → 503
        http2MaxRequests: 1000
        maxRequestsPerConnection: 10
        maxRetries: 3
        retryOn: "gateway-error,connect-failure,retriable-4xx"
        retryRemoteStatuses: "503,429"
        consecutiveGatewayErrors: 5
        interval: 10s

    # Outlier detection — eject unhealthy pods
    outlierDetection:
      consecutiveGatewayErrors: 5     # 5 consecutive 5xx → eject pod
      consecutive5xxErrors: 5
      interval: 10s
      baseEjectionTime: 30s           # Stay ejected for 30s minimum
      maxEjectionPercent: 50          # Never eject > 50% of pods
      splitExternalLocalOriginErrors: true

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: payment-service-circuit-breaker
  namespace: app
spec:
  host: payment-service.app.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 50     # Payment is stateful — lower connection limit
      http:
        http1MaxPendingRequests: 50
        http2MaxRequests: 500
        maxRequestsPerConnection: 5    # Tighter limit for payment service
    outlierDetection:
      consecutiveGatewayErrors: 3     # Eject faster for payment (critical path)
      interval: 5s
      baseEjectionTime: 60s           # Longer ejection — give payment time to recover
      maxEjectionPercent: 33          # Never eject > 1/3 of payment pods

---
# ── Load Shedding — Envoy filter (priority-based request dropping) ─────────────
# When the system is overloaded, drop low-priority requests before
# the system collapses entirely. Better to reject some than fail all.

apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: load-shedding
  namespace: app
spec:
  workloadSelector:
    labels:
      app: order-service
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: SIDECAR_INBOUND
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.lua
          typed_config:
            "@type": "type.googleapis.com/envoy.extensions.filters.http.lua.v3.LuaPerRoute"
            inline_code: |
              -- Load shedding based on CPU pressure signal from Prometheus
              -- Priority tiers: P0 (health) > P1 (orders) > P2 (notifications) > P3 (batch)

              local SHED_HEADER = "x-priority"
              local CPU_THRESHOLD_P3 = 0.80   -- Shed P3 at 80% CPU
              local CPU_THRESHOLD_P2 = 0.90   -- Shed P2 at 90% CPU
              local CPU_THRESHOLD_P1 = 0.95   -- Shed P1 at 95% CPU

              -- In production this reads from a shared memory segment updated
              -- by a sidecar that polls Prometheus every 5 seconds
              -- For simplicity shown as a function call here
              local function get_cpu_pressure()
                -- Returns 0.0 to 1.0
                return tonumber(os.getenv("CPU_PRESSURE") or "0") or 0
              end

              local function get_priority(request_handle)
                local priority = request_handle:headers():get(SHED_HEADER)
                if priority then return tonumber(priority) or 2 end

                local path = request_handle:headers():get(":path") or ""
                if path:match("^/health") then return 0 end
                if path:match("^/payments") then return 0 end
                if path:match("^/orders$") and
                   request_handle:headers():get(":method") == "POST" then
                  return 1
                end
                if path:match("^/orders") then return 1 end
                if path:match("^/notifications") then return 2 end
                return 3   -- Everything else is P3 (batch, analytics)
              end

              function envoy_on_request(request_handle)
                local cpu    = get_cpu_pressure()
                local prio   = get_priority(request_handle)
                local shed   = false

                if cpu >= CPU_THRESHOLD_P1 and prio >= 1 then shed = true
                elseif cpu >= CPU_THRESHOLD_P2 and prio >= 2 then shed = true
                elseif cpu >= CPU_THRESHOLD_P3 and prio >= 3 then shed = true
                end

                if shed then
                  request_handle:respond(
                    {[":status"] = "503",
                     ["x-shed-priority"] = tostring(prio),
                     ["x-cpu-pressure"]  = tostring(cpu),
                     ["retry-after"]     = "5"},
                    "Service temporarily overloaded — please retry"
                  )
                end
              end

---
# ── KEDA ScaledObject — event-driven autoscaling ─────────────────────────────
# KEDA scales based on Prometheus metrics (RPS, queue depth, etc.)
# Faster and more accurate than HPA v2 for event-driven workloads.
# Reads forecasts from the ML forecaster (Phase 5) for predictive scaling.

apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: order-service-keda
  namespace: app
spec:
  scaleTargetRef:
    name: order-service
  minReplicaCount: 3
  maxReplicaCount: 30
  cooldownPeriod:  60    # Don't scale down within 60s of last scale-up
  pollingInterval: 15    # Check every 15 seconds

  triggers:
    # Scale on current RPS (reactive)
    - type: prometheus
      metadata:
        serverAddress: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
        metricName: order_service_rps
        query: sum(rate(order_service_requests_total[1m]))
        threshold: "50"    # Scale when > 50 RPS per replica

    # Scale on p95 latency (latency-driven scaling)
    - type: prometheus
      metadata:
        serverAddress: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
        metricName: order_service_latency_p95
        query: |
          histogram_quantile(0.95,
            sum by (le) (rate(order_service_request_duration_seconds_bucket[1m]))
          ) * 1000
        threshold: "150"   # Scale when p95 > 150ms

    # Predictive scale: read ML forecaster's recommendation (Phase 5)
    - type: prometheus
      metadata:
        serverAddress: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
        metricName: ml_forecast_recommended_replicas
        query: |
          ceil(ml_forecast_upper_rps{service="order-service"} / 50)
        threshold: "1"     # Threshold of 1 means "scale to the metric value"

---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: notification-service-keda
  namespace: app
spec:
  scaleTargetRef:
    name: notification-service
  minReplicaCount: 2
  maxReplicaCount: 20
  triggers:
    # Scale notification-service on Kafka consumer lag
    - type: kafka
      metadata:
        bootstrapServers: "kafka.app.svc.cluster.local:9092"
        consumerGroup: notification-service
        topic: orders
        lagThreshold: "1000"   # Scale when lag > 1000 messages
        offsetResetPolicy: latest

    - type: kafka
      metadata:
        bootstrapServers: "kafka.app.svc.cluster.local:9092"
        consumerGroup: notification-service
        topic: payments
        lagThreshold: "500"
        offsetResetPolicy: latest

---
# ── Global rate limiting via Envoy RateLimitService ──────────────────────────
# Per-customer rate limiting using Redis as the shared state store
# Works across all pods (unlike per-pod rate limiting which is easily bypassed)

apiVersion: v1
kind: ConfigMap
metadata:
  name: ratelimit-config
  namespace: app
data:
  config.yaml: |
    domain: autonomous-observability-ratelimit
    descriptors:

      # Global rate limit: 10,000 req/min per customer
      - key: customer_id
        rate_limit:
          unit: minute
          requests_per_unit: 10000

      # Endpoint-specific limits
      - key: customer_id
        value: POST /orders
        rate_limit:
          unit: second
          requests_per_unit: 100   # 100 order creates per second per customer

      - key: customer_id
        value: POST /payments
        rate_limit:
          unit: second
          requests_per_unit: 50    # Payment service is more expensive — tighter limit

      # Anonymous requests (no customer_id) — much lower limit
      - key: remote_address
        rate_limit:
          unit: minute
          requests_per_unit: 100
