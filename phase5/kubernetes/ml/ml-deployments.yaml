---
# ── RBAC ──────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: ServiceAccount
metadata:
  name: ml-service-account
  namespace: ml

---
# ML services only need read access — they observe but don't mutate
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ml-observer
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ml-observer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ml-observer
subjects:
  - kind: ServiceAccount
    name: ml-service-account
    namespace: ml
