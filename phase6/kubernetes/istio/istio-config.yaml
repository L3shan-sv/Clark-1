# kubernetes/istio/istio-config.yaml
# Istio Service Mesh — Zero Trust networking.
#
# Every connection between pods is:
#   1. Mutually authenticated (both sides prove identity via X.509)
#   2. Encrypted in transit (TLS 1.3)
#   3. Authorised (AuthorizationPolicy — explicit allow, default deny)
#   4. Observable (all traffic metrics, traces, logs flow through Envoy)
#
# Identity model: SPIFFE (Secure Production Identity Framework For Everyone)
#   Every pod gets a SPIFFE URI: spiffe://cluster.local/ns/app/sa/order-service
#   This is cryptographically bound to the Kubernetes ServiceAccount
#   No IP-based trust — pods can move nodes/IPs and identity stays the same

---
# ── Istio Install (via IstioOperator) ─────────────────────────────────────────
apiVersion: install.istio.io/v1alpha1
kind: IstioOperator
metadata:
  name: autonomous-observability-istio
  namespace: istio-system
spec:
  profile: production
  meshConfig:
    # Default deny — no traffic flows unless explicitly allowed
    outboundTrafficPolicy:
      mode: REGISTRY_ONLY    # Only talk to registered services

    # Access logs to stdout — picked up by Loki
    accessLogFile: /dev/stdout
    accessLogFormat: |
      {
        "timestamp": "%START_TIME%",
        "method": "%REQ(:METHOD)%",
        "path": "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%",
        "protocol": "%PROTOCOL%",
        "response_code": "%RESPONSE_CODE%",
        "duration_ms": "%DURATION%",
        "src_namespace": "%ENVIRONMENT(POD_NAMESPACE)%",
        "src_workload": "%ENVIRONMENT(WORKLOAD_NAME)%",
        "dst_service": "%REQ(:AUTHORITY)%",
        "trace_id": "%REQ(X-B3-TRACEID)%",
        "span_id": "%REQ(X-B3-SPANID)%",
        "upstream_host": "%UPSTREAM_HOST%"
      }

    # Propagate OpenTelemetry trace context
    defaultConfig:
      tracing:
        zipkin:
          address: "tempo.observability.svc.cluster.local:9411"
        sampling: 100.0    # 100% in dev/staging, 1% in prod (adjust)

    enablePrometheusMerge: true    # Merge app metrics with Istio metrics

  components:
    pilot:
      k8s:
        resources:
          requests:
            cpu: "500m"
            memory: "2Gi"
        nodeSelector:
          role: system

    ingressGateways:
      - name: istio-ingressgateway
        enabled: true
        k8s:
          nodeSelector:
            role: system
          service:
            type: LoadBalancer

---
# ── PeerAuthentication — enforce mTLS cluster-wide ────────────────────────────
# STRICT mode: ALL traffic between pods must use mTLS
# If a service doesn't have a sidecar → it cannot talk to services in the mesh
# This eliminates the "one compromised pod talks to everything" attack

apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default-mtls
  namespace: app
spec:
  mtls:
    mode: STRICT     # No plaintext. Ever. In this namespace.

---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default-mtls
  namespace: ml
spec:
  mtls:
    mode: STRICT

---
# ── AuthorizationPolicies — explicit allow, default deny ─────────────────────
# Default deny-all for the app namespace.
# Then we whitelist exactly what needs to talk to what.

apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: deny-all
  namespace: app
spec: {}   # Empty spec = deny all

---
# Allow: order-service → payment-service (and ONLY order-service)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-order-to-payment
  namespace: app
spec:
  selector:
    matchLabels:
      app: payment-service
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/app/sa/order-service"    # SPIFFE identity
      to:
        - operation:
            methods: ["POST"]
            paths: ["/payments", "/payments/*"]

---
# Allow: Prometheus → all services (metrics scraping)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-prometheus-scraping
  namespace: app
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/observability/sa/kube-prometheus-stack-prometheus"
      to:
        - operation:
            methods: ["GET"]
            paths: ["/metrics"]

---
# Allow: ingress gateway → order-service (external traffic in)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-order
  namespace: app
spec:
  selector:
    matchLabels:
      app: order-service
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"
      to:
        - operation:
            methods: ["GET", "POST"]
            paths: ["/orders", "/orders/*", "/health/*"]

---
# Allow: notification-service and analytics-service → Kafka (via FQDN)
# These are Kafka consumers — they only need egress to Kafka, not to other services
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-consumers-to-kafka
  namespace: app
spec:
  selector:
    matchLabels:
      app: kafka
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/app/sa/notification-service"
              - "cluster.local/ns/app/sa/analytics-service"
              - "cluster.local/ns/app/sa/order-service"
              - "cluster.local/ns/app/sa/payment-service"

---
# ── DestinationRules — connection-level security ──────────────────────────────

# Require TLS 1.3 minimum for all service-to-service calls
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: default-tls-settings
  namespace: app
spec:
  host: "*.app.svc.cluster.local"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http2MaxRequests: 1000
        maxRequestsPerConnection: 10    # Limit blast radius of any single connection
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 50

---
# ── Sidecar resource limits ───────────────────────────────────────────────────
# Istio sidecars have no default limits — this sets them cluster-wide
apiVersion: networking.istio.io/v1beta1
kind: Sidecar
metadata:
  name: default-sidecar-limits
  namespace: app
spec:
  egress:
    - hosts:
        - "./*"             # Same namespace
        - "observability/*" # Metrics and tracing
        - "istio-system/*"  # Istio control plane
        - "security/*"      # Vault
  outboundTrafficPolicy:
    mode: REGISTRY_ONLY
