version: "3.9"

services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  redis:
    image: redis:7.2-alpine
    ports: ["6379:6379"]
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper: { condition: service_healthy }
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.92.0
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml

  # ── Services — each builds from its own Dockerfile ───────────────────────────

  order-service:
    build:
      context: ./order-service     # ← own Dockerfile
      dockerfile: Dockerfile
    ports: ["8000:8000"]
    environment:
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      PAYMENT_SERVICE_URL: http://payment-service:8000
      OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    restart: unless-stopped

  payment-service:
    build:
      context: ./payment-service   # ← own Dockerfile
      dockerfile: Dockerfile
    ports: ["8001:8000"]
    environment:
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    restart: unless-stopped

  notification-service:
    build:
      context: ./notification-service   # ← own Dockerfile
      dockerfile: Dockerfile
    ports: ["8002:8000"]
    environment:
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    restart: unless-stopped

  analytics-service:
    build:
      context: ./analytics-service   # ← own Dockerfile
      dockerfile: Dockerfile
    ports: ["8003:8000"]
    environment:
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    restart: unless-stopped
