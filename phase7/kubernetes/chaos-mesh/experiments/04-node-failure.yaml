#       matchLabels:
#         app: order-service

---
# ── Cluster Autoscaler configuration ──────────────────────────────────────────
# Provisions new nodes fast enough for the chaos experiment to "pass"

apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-autoscaler-config
  namespace: kube-system
data:
  # Key tuning parameters for fast node provisioning
  config.yaml: |
    scale-down-enabled: true
    scale-down-delay-after-add: 5m
    scale-down-unneeded-time: 10m
    scale-down-utilization-threshold: 0.5
    max-node-provision-time: 5m      # Fail if node not ready in 5 min
    scan-interval: 10s               # Check every 10s (default is 10s)
    skip-nodes-with-local-storage: false
    expander: least-waste

---
# ── Verification queries to run DURING experiment ────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: exp04-verification-queries
  namespace: chaos
data:
  queries.md: |
    # Run these in Prometheus during Experiment 4

    # 1. Node availability (should drop to ~0.88 with 8/9 nodes healthy)
    sum(kube_node_status_condition{condition="Ready",status="true"}) / count(kube_node_info)

    # 2. Pod scheduling across AZs (should stay balanced)
    count by (topology_kubernetes_io_zone) (
      kube_pod_info{namespace="app"}
    )

    # 3. Pending pods (should be 0 within 60s of node failure)
    count(kube_pod_status_phase{namespace="app",phase="Pending"})

    # 4. Error rate during reschedule (should stay < 0.1%)
    sum(rate(order_service_requests_total{status_code=~"5.."}[1m]))
    /
    sum(rate(order_service_requests_total[1m]))

    # 5. Time to reschedule (watch this number drop to 0)
    count(kube_pod_status_phase{namespace="app",phase="Pending"})
